apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-dev
  namespace: argocd
spec:
  project: emicorp
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  sources:
    - repoURL: https://github.com/nvim-solutions/emicorp-org-devops-platform.git
      targetRevision: main
      path: charts/postgres
      helm:
        valueFiles:
          - $values/environments/dev/postgres.values.yaml
    - repoURL: https://github.com/nvim-solutions/emicorp-org-devops-platform.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true