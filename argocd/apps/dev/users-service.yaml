apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: users-service-dev
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: users=ghcr.io/nvim-solutions/users-service
    argocd-image-updater.argoproj.io/users.update-strategy: newest-build
    argocd-image-updater.argoproj.io/users.allow-tags: regexp:^sha-[0-9a-f]{7,8}$
    argocd-image-updater.argoproj.io/users.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/users.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: https://github.com/nvim-solutions/emicorp-org-devops-platform.git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:$values/environments/dev/users-service.values.yaml
spec:
  project: emicorp
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  sources:
    - repoURL: https://github.com/nvim-solutions/emicorp-org-devops-helm-users-service.git
      targetRevision: main
      path: .
      helm:
        valueFiles:
          - $values/environments/dev/users-service.values.yaml
    - repoURL: https://github.com/nvim-solutions/emicorp-org-devops-platform.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true