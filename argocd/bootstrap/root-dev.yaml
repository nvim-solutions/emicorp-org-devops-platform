apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dev
  namespace: argocd
spec:
  project: emicorp
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/nvim-solutions/emicorp-org-devops-platform.git
    targetRevision: main
    path: argocd/apps/dev
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true